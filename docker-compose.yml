services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=usuario
      - DB_PASSWORD=senha
      - DB_NAME=meu_banco
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root_senha
      - MYSQL_DATABASE=meu_banco
      - MYSQL_USER=usuario
      - MYSQL_PASSWORD=senha
    ports:
      - "3306:3306"
    volumes:
      - dados_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dados_mysql: