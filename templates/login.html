{% extends 'base.html' %}
{% block titulo %}Login - IBK{% endblock %}
{% block conteudo %}
<div class="flex items-center justify-center mt-10">
    <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
        <div class="flex flex-col items-center mb-6">
            <img src="{{ url_for('static', filename='images/LOGO_IBK.webp') }}" alt="IBK" class="h-20 w-20 mb-3">
            <h1 class="text-xl font-bold text-blue-800 text-center">Plataforma de Avaliacao</h1>
            <p class="text-slate-500 text-sm">Sindrome do X Fragil - IBK</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <label class="block text-sm font-medium mb-1">Email</label>
            <input type="email" name="email" required class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            <label class="block text-sm font-medium mb-1">Senha</label>
            <input type="password" name="senha" required class="w-full border border-slate-300 rounded px-3 py-2 mb-6">
            <button type="submit" class="w-full bg-blue-700 text-white py-2 rounded hover:bg-blue-600 font-semibold">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
