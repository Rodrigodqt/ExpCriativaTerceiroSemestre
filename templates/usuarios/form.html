{% extends 'base.html' %}
{% block titulo %}{% if usuario %}Editar Usuário{% else %}Novo Usuário{% endif %} - IBK{% endblock %}
{% block conteudo %}
<h1 class="text-2xl font-bold mb-6">{% if usuario %}Editar Usuário{% else %}Novo Usuário{% endif %}</h1>

<div class="bg-white rounded-lg shadow p-6 max-w-2xl">
    {% if usuario %}
    <form method="POST" action="{{ url_for('usuarios.editar', usuario_id=usuario.id) }}">
    {% else %}
    <form method="POST" action="{{ url_for('usuarios.novo') }}">
    {% endif %}
        <label class="block text-sm font-medium mb-1">Nome</label>
        <input type="text" name="nome" value="{{ usuario.nome if usuario else '' }}" required class="w-full border border-slate-300 rounded px-3 py-2 mb-4">

        <label class="block text-sm font-medium mb-1">Email</label>
        <input type="email" name="email" value="{{ usuario.email if usuario else '' }}" required class="w-full border border-slate-300 rounded px-3 py-2 mb-4">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Tipo</label>
                <select name="tipo" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
                    <option value="admin" {% if usuario and usuario.tipo == 'admin' %}selected{% endif %}>admin</option>
                    <option value="profissional" {% if usuario and usuario.tipo == 'profissional' %}selected{% endif %}>profissional</option>
                    <option value="paciente" {% if usuario and usuario.tipo == 'paciente' %}selected{% endif %}>paciente</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">CPF</label>
                <input type="text" name="cpf" value="{{ usuario.cpf if usuario else '' }}" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">CRM (opcional)</label>
                <input type="text" name="crm" value="{{ usuario.crm if usuario and usuario.crm else '' }}" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Especialidade (opcional)</label>
                <input type="text" name="especialidade" value="{{ usuario.especialidade if usuario and usuario.especialidade else '' }}" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            </div>
        </div>

        <label class="block text-sm font-medium mb-1">Senha {% if usuario %}(deixe em branco para manter a atual){% endif %}</label>
        <input type="password" name="senha" {% if not usuario %}required{% endif %} class="w-full border border-slate-300 rounded px-3 py-2 mb-6">

        <div class="flex gap-3">
            <button type="submit" class="bg-blue-700 text-white px-4 py-2 rounded hover:bg-blue-600">Salvar</button>
            <a href="{{ url_for('usuarios.listar') }}" class="bg-slate-200 text-slate-700 px-4 py-2 rounded hover:bg-slate-300">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
