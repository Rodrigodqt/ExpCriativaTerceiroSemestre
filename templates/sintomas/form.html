{% extends 'base.html' %}
{% block titulo %}{% if sintoma %}Editar Sintoma{% else %}Novo Sintoma{% endif %} - IBK{% endblock %}
{% block conteudo %}
<h1 class="text-2xl font-bold mb-6">{% if sintoma %}Editar Sintoma{% else %}Novo Sintoma{% endif %}</h1>

<div class="bg-white rounded-lg shadow p-6 max-w-2xl">
    {% if sintoma %}
    <form method="POST" action="{{ url_for('sintomas.editar', sintoma_id=sintoma.id) }}">
    {% else %}
    <form method="POST" action="{{ url_for('sintomas.novo') }}">
    {% endif %}
        <label class="block text-sm font-medium mb-1">Nome</label>
        <input type="text" name="nome" value="{{ sintoma.nome if sintoma else '' }}" required class="w-full border border-slate-300 rounded px-3 py-2 mb-4">

        <label class="block text-sm font-medium mb-1">Descricao</label>
        <textarea name="descricao" rows="3" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">{{ sintoma.descricao if sintoma else '' }}</textarea>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Categoria</label>
                <input type="text" name="categoria" value="{{ sintoma.categoria if sintoma else '' }}" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Ordem</label>
                <input type="number" name="ordem" value="{{ sintoma.ordem if sintoma else 0 }}" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Peso Masculino</label>
                <input type="number" step="0.01" name="peso_masculino" value="{{ sintoma.peso_masculino if sintoma else '' }}" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Peso Feminino (deixe em branco se nao se aplica)</label>
                <input type="number" step="0.01" name="peso_feminino" value="{{ sintoma.peso_feminino if sintoma and sintoma.peso_feminino is not none else '' }}" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            </div>
        </div>

        <div class="flex gap-3">
            <button type="submit" class="bg-blue-700 text-white px-4 py-2 rounded hover:bg-blue-600">Salvar</button>
            <a href="{{ url_for('sintomas.listar') }}" class="bg-slate-200 text-slate-700 px-4 py-2 rounded hover:bg-slate-300">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
