{% extends 'base.html' %}
{% block titulo %}{% if paciente %}Editar Paciente{% else %}Novo Paciente{% endif %} - IBK{% endblock %}
{% block conteudo %}
<h1 class="text-2xl font-bold mb-6">{% if paciente %}Editar Paciente{% else %}Novo Paciente{% endif %}</h1>

<div class="bg-white rounded-lg shadow p-6 max-w-2xl">
    {% if paciente %}
    <form method="POST" action="{{ url_for('pacientes.editar', paciente_id=paciente.id) }}">
    {% else %}
    <form method="POST" action="{{ url_for('pacientes.novo') }}">
    {% endif %}
        <label class="block text-sm font-medium mb-1">Nome</label>
        <input type="text" name="nome" value="{{ paciente.nome if paciente else '' }}" required class="w-full border border-slate-300 rounded px-3 py-2 mb-4">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Data de Nascimento</label>
                <input type="date" name="data_nascimento" value="{{ paciente.data_nascimento if paciente and paciente.data_nascimento else '' }}" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Sexo</label>
                <select name="sexo" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
                    <option value="M" {% if paciente and paciente.sexo == 'M' %}selected{% endif %}>Masculino</option>
                    <option value="F" {% if paciente and paciente.sexo == 'F' %}selected{% endif %}>Feminino</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">CPF</label>
                <input type="text" name="cpf" value="{{ paciente.cpf if paciente else '' }}" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Contato</label>
                <input type="text" name="contato" value="{{ paciente.contato if paciente else '' }}" class="w-full border border-slate-300 rounded px-3 py-2 mb-4">
            </div>
        </div>

        <label class="block text-sm font-medium mb-1">Historico Familiar</label>
        <textarea name="historico_familiar" rows="4" class="w-full border border-slate-300 rounded px-3 py-2 mb-6">{{ paciente.historico_familiar if paciente else '' }}</textarea>

        <div class="flex gap-3">
            <button type="submit" class="bg-blue-700 text-white px-4 py-2 rounded hover:bg-blue-600">Salvar</button>
            <a href="{{ url_for('pacientes.listar') }}" class="bg-slate-200 text-slate-700 px-4 py-2 rounded hover:bg-slate-300">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
